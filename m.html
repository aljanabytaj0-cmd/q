<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة قاعة الانتظار الرئيسية</title>
<style>
  :root{ --teal-deep:#16224f; --teal:#2f4fa3; --sand:#f3f5fb; --ink:#1c2333; --muted:#6b7480; --amber:#d8384a; --line:#e2e6f0; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{
    font-family:"Tahoma","Segoe UI",Arial,sans-serif;background:var(--sand);color:var(--ink);
    height:100vh;display:flex;flex-direction:column;
  }

  header{
    background:linear-gradient(100deg, #0d1733, var(--teal-deep) 55%, var(--teal));
    color:#fff;padding:20px 28px;display:flex;align-items:center;
    justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  header h1{margin:0;font-size:clamp(20px,2.4vw,32px);}
  header .sub{font-size:clamp(11px,1.2vw,15px);opacity:.85;margin-top:4px;}
  #syncStatus{font-size:clamp(11px,1.1vw,14px);}
  #clock{font-size:clamp(16px,1.8vw,26px);font-weight:800;text-align:center;}
  #dateLine{font-size:clamp(11px,1.1vw,14px);text-align:center;opacity:.85;}
  #soundToggle, #settingsToggle{
    background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;
    border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;
  }

  .content-split{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;}
  .queue-pane{flex:1 1 58%;overflow-y:auto;min-width:0;}
  .video-pane{
    flex:1 1 42%;background:#000;position:relative;display:flex;align-items:center;justify-content:center;
    border-right:3px solid var(--teal-deep);min-width:0;
  }
  .video-pane iframe, .video-pane video{width:100%;height:100%;border:0;display:block;}
  .video-placeholder{color:#aab3c5;text-align:center;font-size:clamp(14px,1.6vw,20px);padding:20px;line-height:1.8;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;
    padding:22px;
  }
  .cell{
    background:#fff;border-radius:18px;padding:22px 14px 18px;text-align:center;
    border:2px solid var(--line);border-top:5px solid var(--teal);
    box-shadow:0 4px 16px rgba(22,34,79,0.08);
    transition:border-color .3s ease, transform .3s ease, box-shadow .3s ease;
  }
  .cell.flash{ border-color:var(--amber); border-top-color:var(--amber); transform:scale(1.03); box-shadow:0 8px 24px rgba(216,56,74,0.25); }
  .cell .dname{font-size:clamp(16px,1.6vw,22px);font-weight:800;color:var(--teal-deep);margin-bottom:6px;}
  .cell .num{font-size:clamp(38px,5vw,66px);font-weight:900;color:var(--ink);line-height:1;}
  .cell .num.empty{color:var(--muted);font-size:clamp(24px,2.6vw,34px);}

  .empty-note{padding:60px;text-align:center;color:var(--muted);font-size:16px;}

  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(10,15,35,0.65);
    align-items:center;justify-content:center;z-index:999;padding:16px;
  }
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:16px;padding:22px;max-width:520px;width:100%;color:var(--ink);}
  .modal h3{margin:0 0 6px;color:var(--teal-deep);}
  .modal .hint{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .modal textarea{
    width:100%;min-height:180px;font-family:inherit;font-size:14px;padding:10px;border-radius:10px;
    border:1px solid var(--line);resize:vertical;direction:ltr;text-align:left;
  }
  #videoLinksList{max-height:280px;overflow-y:auto;margin-bottom:10px;}
  .video-link-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .video-link-row .row-num{
    flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;
    font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;
  }
  .video-link-row input{
    flex:1;min-width:0;font-family:inherit;font-size:13.5px;padding:9px 10px;border-radius:8px;
    border:1px solid var(--line);direction:ltr;text-align:left;
  }
  .video-link-row .row-remove{
    flex-shrink:0;background:#fdecee;color:var(--amber);border:1px solid var(--amber);
    border-radius:8px;padding:7px 11px;font-size:13px;cursor:pointer;font-weight:700;
  }
  .btn-add-video{
    width:100%;background:#eef1fb;color:var(--teal);border:1.5px dashed var(--teal);border-radius:10px;
    padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:6px;
  }
  .modal .modal-actions{display:flex;gap:10px;margin-top:14px;}
  .modal button{
    font-family:inherit;font-size:14px;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:700;
  }
  .modal .btn-save{background:var(--teal);color:#fff;}
  .modal .btn-cancel{background:#eef0f6;color:var(--ink);}
</style>
</head>

<script>
(function(){
  "use strict";
  const firebaseConfig = {
    apiKey: "AIzaSyAaK9BQ1CA1RIJkPcSLj6ozgdzNEg5Qmgg",
    authDomain: "hospital-queue-2k.firebaseapp.com",
    projectId: "hospital-queue-2k",
    storageBucket: "hospital-queue-2k.firebasestorage.app",
    messagingSenderId: "522241092777",
    appId: "1:522241092777:web:53988cc45d5035285dcdb8"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  try{
    db.enablePersistence({synchronizeTabs:true}).catch(err=>console.warn("تعذر تفعيل التخزين المؤقت المحلي", err));
  }catch(e){ console.warn(e); }
  const stateDocRef = db.collection("hospitalQueue").doc("state");
  const settingsDocRef = db.collection("hospitalQueue").doc("mainScreenSettings");
  const SETTINGS_PASSWORD = "HSO2000";

  let soundEnabled = false;
  let previousServing = {};
  let firstSnapshot = true;
  let audioCtx = null;

  function ensureAudioContext(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  document.getElementById("soundToggle").addEventListener("click", ()=>{
    soundEnabled = !soundEnabled;
    document.getElementById("soundToggle").textContent = soundEnabled ? "🔊 التنبيه الصوتي مفعّل" : "🔇 تفعيل التنبيه الصوتي";
    if(soundEnabled){
      ensureAudioContext(); // unlock audio with this user gesture
    }
  });

  function updateSyncStatus(text, ok){
    const el = document.getElementById("syncStatus");
    el.textContent = text;
    el.style.color = ok ? "#bfe9c9" : "#f3c98a";
  }

  function tickClock(){
    const now = new Date();
    document.getElementById("clock").textContent =
      String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    document.getElementById("dateLine").textContent =
      String(now.getDate()).padStart(2,"0")+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+now.getFullYear();
  }
  tickClock();
  setInterval(tickClock, 1000*15);

  function playAlertBeep(){
    try{
      const ctx = ensureAudioContext();
      const now = ctx.currentTime;
      // Classic bank/counter "ding-dong" chime: two descending bell-like notes
      const notes = [ {freq:659.25, start:0}, {freq:523.25, start:0.38} ]; // E5 -> C5
      notes.forEach(n=>{
        const fundamental = ctx.createOscillator();
        const harmonic = ctx.createOscillator();
        const fundGain = ctx.createGain();
        const harmGain = ctx.createGain();

        fundamental.type = "sine";
        harmonic.type = "sine";
        fundamental.frequency.setValueAtTime(n.freq, now + n.start);
        harmonic.frequency.setValueAtTime(n.freq * 2, now + n.start);

        fundGain.gain.setValueAtTime(0.0001, now + n.start);
        fundGain.gain.exponentialRampToValueAtTime(0.6, now + n.start + 0.015);
        fundGain.gain.exponentialRampToValueAtTime(0.0001, now + n.start + 0.85);

        harmGain.gain.setValueAtTime(0.0001, now + n.start);
        harmGain.gain.exponentialRampToValueAtTime(0.18, now + n.start + 0.015);
        harmGain.gain.exponentialRampToValueAtTime(0.0001, now + n.start + 0.6);

        fundamental.connect(fundGain).connect(ctx.destination);
        harmonic.connect(harmGain).connect(ctx.destination);

        fundamental.start(now + n.start);
        fundamental.stop(now + n.start + 0.9);
        harmonic.start(now + n.start);
        harmonic.stop(now + n.start + 0.65);
      });
    }catch(e){ console.error(e); }
  }

  function announce(dept, number){
    if(!soundEnabled) return;
    playAlertBeep();
  }

  // ---------- Video playlist (queue-room screen) ----------
  let videoLinks = [];
  let currentVideoIndex = 0;
  let ytPlayer = null;
  let youtubeApiReady = false;
  let youtubeApiLoading = false;
  let lastVideoLinksKey = null;

  function isYouTubeUrl(url){
    return /(?:youtube\.com|youtu\.be)/i.test(url);
  }
  function extractYouTubeId(url){
    try{
      const u = new URL(url);
      if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
      if(u.searchParams.get("v")) return u.searchParams.get("v");
      const parts = u.pathname.split("/").filter(Boolean);
      const embedIdx = parts.indexOf("embed");
      if(embedIdx>=0 && parts[embedIdx+1]) return parts[embedIdx+1];
    }catch(e){}
    return null;
  }
  function loadYouTubeApiIfNeeded(callback){
    if(youtubeApiReady){ callback(); return; }
    if(youtubeApiLoading){
      const check = setInterval(()=>{ if(youtubeApiReady){ clearInterval(check); callback(); } }, 200);
      return;
    }
    youtubeApiLoading = true;
    window.onYouTubeIframeAPIReady = function(){
      youtubeApiReady = true;
      callback();
    };
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  }
  function advanceVideo(){
    if(!videoLinks.length) return;
    currentVideoIndex = (currentVideoIndex + 1) % videoLinks.length;
    playCurrentVideo();
  }
  function playCurrentVideo(){
    const pane = document.getElementById("videoPane");
    if(!videoLinks.length){
      pane.innerHTML = '<div class="video-placeholder">لا توجد فيديوهات مضافة بعد<br>أضفها من زر ⚙ الإعدادات</div>';
      return;
    }
    if(currentVideoIndex >= videoLinks.length) currentVideoIndex = 0;
    const url = videoLinks[currentVideoIndex];

    if(isYouTubeUrl(url)){
      const videoId = extractYouTubeId(url);
      if(!videoId){ advanceVideo(); return; }
      pane.innerHTML = '<div id="ytPlayerContainer" style="width:100%;height:100%;pointer-events:none;"></div>';
      loadYouTubeApiIfNeeded(()=>{
        if(ytPlayer){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer = null; }
        ytPlayer = new YT.Player("ytPlayerContainer", {
          width: "100%", height: "100%", videoId: videoId,
          playerVars:{
            autoplay:1, mute:1, controls:0, rel:0, playsinline:1, modestbranding:1,
            disablekb:1, fs:0, iv_load_policy:3, cc_load_policy:0
          },
          events:{
            onReady:(e)=>{
              try{ e.target.setPlaybackQuality("small"); }catch(err){}
            },
            onStateChange:(e)=>{
              if(e.data === YT.PlayerState.ENDED) advanceVideo();
              if(e.data === YT.PlayerState.PLAYING){
                try{ e.target.setPlaybackQuality("small"); }catch(err){}
              }
            },
            onError:()=>{ advanceVideo(); }
          }
        });
      });
    }else{
      pane.innerHTML = '<video id="directVideo" autoplay muted playsinline></video>';
      const vid = document.getElementById("directVideo");
      vid.src = url;
      vid.addEventListener("ended", advanceVideo, {once:true});
      vid.addEventListener("error", advanceVideo, {once:true});
      vid.play().catch(()=>{});
    }
  }

  let lowBandwidthMode = false;

  function applyLowBandwidthLayout(){
    const videoPane = document.getElementById("videoPane");
    const queuePane = document.querySelector(".queue-pane");
    if(lowBandwidthMode){
      videoPane.style.display = "none";
      queuePane.style.flex = "1 1 100%";
      if(ytPlayer){ try{ ytPlayer.destroy(); }catch(e){} ytPlayer = null; }
    }else{
      videoPane.style.display = "flex";
      queuePane.style.flex = "1 1 58%";
      playCurrentVideo();
    }
  }

  settingsDocRef.onSnapshot((snap)=>{
    const data = snap.exists ? snap.data() : {};
    const links = Array.isArray(data.videoLinks) ? data.videoLinks : [];
    const key = JSON.stringify(links);
    const newLowBandwidth = !!data.lowBandwidthMode;
    const lowBandwidthChanged = newLowBandwidth !== lowBandwidthMode;
    lowBandwidthMode = newLowBandwidth;
    if(lowBandwidthChanged){
      applyLowBandwidthLayout();
    }
    if(key !== lastVideoLinksKey){
      lastVideoLinksKey = key;
      videoLinks = links;
      currentVideoIndex = 0;
      if(!lowBandwidthMode) playCurrentVideo();
    }
  }, (err)=>{
    console.error("تعذر تحميل إعدادات الفيديو", err);
  });

  function renderVideoLinksRows(links){
    const list = document.getElementById("videoLinksList");
    list.innerHTML = "";
    const items = links.length ? links.slice() : [""];
    items.forEach((url, idx)=>{
      addVideoLinkRow(url, idx+1);
    });
  }
  function addVideoLinkRow(url, num){
    const list = document.getElementById("videoLinksList");
    const row = document.createElement("div");
    row.className = "video-link-row";
    row.innerHTML = `
      <div class="row-num">${num || (list.children.length+1)}</div>
      <input type="text" placeholder="https://www.youtube.com/watch?v=xxxxxxx" value="${(url||"").replace(/"/g,"&quot;")}">
      <button type="button" class="row-remove">حذف</button>
    `;
    row.querySelector(".row-remove").addEventListener("click", ()=>{
      row.remove();
      renumberVideoRows();
    });
    list.appendChild(row);
  }
  function renumberVideoRows(){
    const rows = document.querySelectorAll("#videoLinksList .video-link-row");
    rows.forEach((row, i)=>{
      row.querySelector(".row-num").textContent = i+1;
    });
  }
  document.getElementById("addVideoLinkBtn").addEventListener("click", ()=>{
    addVideoLinkRow("", document.querySelectorAll("#videoLinksList .video-link-row").length + 1);
  });

  document.getElementById("settingsToggle").addEventListener("click", ()=>{
    const pass = prompt("أدخل كلمة مرور الإعدادات:");
    if(pass === null) return;
    if(pass !== SETTINGS_PASSWORD){
      alert("كلمة المرور غير صحيحة");
      return;
    }
    renderVideoLinksRows(videoLinks);
    document.getElementById("lowBandwidthCheckbox").checked = lowBandwidthMode;
    document.getElementById("settingsModal").classList.add("show");
  });
  document.getElementById("cancelVideoLinksBtn").addEventListener("click", ()=>{
    document.getElementById("settingsModal").classList.remove("show");
  });
  document.getElementById("saveVideoLinksBtn").addEventListener("click", async ()=>{
    const inputs = document.querySelectorAll("#videoLinksList .video-link-row input");
    const links = Array.from(inputs).map(inp=>inp.value.trim()).filter(Boolean);
    const lowBandwidth = document.getElementById("lowBandwidthCheckbox").checked;
    try{
      await settingsDocRef.set({videoLinks: links, lowBandwidthMode: lowBandwidth}, {merge:true});
      document.getElementById("settingsModal").classList.remove("show");
    }catch(e){
      console.error(e);
      alert("تعذر حفظ الروابط، تحقق من الاتصال بالإنترنت");
    }
  });

  function render(departments, nowServing){
    const grid = document.getElementById("grid");
    document.getElementById("emptyNote").style.display = departments.length ? "none" : "block";
    grid.innerHTML = "";
    departments.forEach(dept=>{
      const serving = nowServing[dept.id] || 0;
      const cell = document.createElement("div");
      cell.className = "cell";
      const numText = serving>0 ? (dept.prefix+"-"+String(serving).padStart(3,"0")) : "—";
      cell.innerHTML = `
        <div class="dname">${escapeHtml(dept.name)}</div>
        <div class="num ${serving>0?"":"empty"}">${numText}</div>
      `;
      if(!firstSnapshot && previousServing[dept.id] !== undefined && previousServing[dept.id] !== serving && serving>0){
        cell.classList.add("flash");
        setTimeout(()=>cell.classList.remove("flash"), 2500);
        announce(dept, serving);
      }
      grid.appendChild(cell);
    });
  }

  function escapeHtml(str){
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  stateDocRef.onSnapshot((snap)=>{
    if(!snap.exists){ updateSyncStatus("⏳ في انتظار إنشاء قاعدة البيانات من جهاز الاستعلامات", false); return; }
    const data = snap.data();
    const departments = data.departments || [];
    const nowServing = data.nowServing || {};
    updateSyncStatus("● متصل - يتزامن لحظياً", true);
    render(departments, nowServing);
    previousServing = Object.assign({}, nowServing);
    firstSnapshot = false;
  }, (err)=>{
    console.error(err);
    updateSyncStatus("⚠ تعذر الاتصال بقاعدة البيانات", false);
  });
})();
</script>
</body>
</html>
